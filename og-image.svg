<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0D0A1E"/>
      <stop offset="100%" stop-color="#1A0F3A"/>
    </linearGradient>
    <radialGradient id="glow1" cx="85%" cy="15%" r="40%">
      <stop offset="0%"   stop-color="#5B3DC8" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#5B3DC8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="15%" cy="85%" r="35%">
      <stop offset="0%"   stop-color="#F5A623" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#F5A623" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#9B72F8" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#9B72F8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>
  <rect width="1200" height="630" fill="url(#glow3)"/>

  <!-- Grid lines (subtle) -->
  <g stroke="rgba(255,255,255,0.03)" stroke-width="1">
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
  </g>

  <!-- Building illustration (right side, wireframe) -->
  <g stroke="#5B3DC8" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0.18" transform="translate(800, 60)">
    <rect x="20" y="110" width="240" height="400" rx="2"/>
    <line x1="20" y1="160" x2="260" y2="160"/>
    <line x1="20" y1="210" x2="260" y2="210"/>
    <line x1="20" y1="260" x2="260" y2="260"/>
    <line x1="20" y1="310" x2="260" y2="310"/>
    <line x1="20" y1="360" x2="260" y2="360"/>
    <line x1="20" y1="410" x2="260" y2="410"/>
    <line x1="20" y1="460" x2="260" y2="460"/>
    <rect x="36" y="120" width="56" height="30" rx="1"/>
    <rect x="112" y="120" width="56" height="30" rx="1"/>
    <rect x="188" y="120" width="56" height="30" rx="1"/>
    <rect x="36" y="170" width="56" height="30" rx="1"/>
    <rect x="112" y="170" width="56" height="30" rx="1"/>
    <rect x="188" y="170" width="56" height="30" rx="1"/>
    <rect x="36" y="220" width="56" height="30" rx="1"/>
    <rect x="112" y="220" width="56" height="30" rx="1"/>
    <rect x="188" y="220" width="56" height="30" rx="1"/>
    <rect x="36" y="270" width="56" height="30" rx="1"/>
    <rect x="112" y="270" width="56" height="30" rx="1"/>
    <rect x="188" y="270" width="56" height="30" rx="1"/>
    <rect x="36" y="320" width="56" height="30" rx="1"/>
    <rect x="112" y="320" width="56" height="30" rx="1"/>
    <rect x="188" y="320" width="56" height="30" rx="1"/>
    <rect x="36" y="370" width="56" height="30" rx="1"/>
    <rect x="112" y="370" width="56" height="30" rx="1"/>
    <rect x="188" y="370" width="56" height="30" rx="1"/>
    <rect x="36" y="420" width="56" height="30" rx="1"/>
    <rect x="112" y="420" width="56" height="30" rx="1"/>
    <rect x="188" y="420" width="56" height="30" rx="1"/>
    <!-- Crane -->
    <line x1="218" y1="18" x2="218" y2="110"/>
    <line x1="130" y1="36" x2="295" y2="36"/>
    <rect x="210" y="26" width="16" height="13" rx="1"/>
    <line x1="150" y1="36" x2="150" y2="62"/>
    <rect x="137" y="62" width="26" height="15" rx="2"/>
    <line x1="278" y1="36" x2="278" y2="82"/>
  </g>

  <!-- Divider line -->
  <line x1="80" y1="540" x2="1120" y2="540" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Logo mark (3 rectangles) -->
  <rect x="80"  y="190" width="36" height="36" rx="5" fill="#5B3DC8"/>
  <rect x="126" y="164" width="36" height="36" rx="5" fill="#5B3DC8" fill-opacity="0.65"/>
  <rect x="172" y="138" width="36" height="36" rx="5" fill="#5B3DC8" fill-opacity="0.35"/>

  <!-- AVANZA wordmark -->
  <text x="80" y="260" font-family="'Segoe UI Black', 'Arial Black', Impact, sans-serif"
        font-size="26" font-weight="900" letter-spacing="6" fill="white" opacity="0.9">
    AVANZA
  </text>

  <!-- Chip / badge -->
  <rect x="80" y="295" width="294" height="32" rx="16" fill="rgba(91,61,200,0.15)" stroke="rgba(91,61,200,0.3)" stroke-width="1"/>
  <text x="127" y="316" font-family="'Segoe UI', Arial, sans-serif"
        font-size="13" font-weight="600" letter-spacing="2" fill="rgba(155,114,248,0.9)">
    GESTIÓN DE OBRA
  </text>
  <circle cx="107" cy="311" r="6" fill="#F5A623"/>

  <!-- Main headline -->
  <text x="80" y="400" font-family="'Segoe UI Black', 'Arial Black', Impact, sans-serif"
        font-size="72" font-weight="900" fill="white" letter-spacing="-2">
    Menos caos.
  </text>
  <text x="80" y="480" font-family="'Segoe UI Black', 'Arial Black', Impact, sans-serif"
        font-size="72" font-weight="900" fill="#F5A623" letter-spacing="-2">
    Más obra.
  </text>

  <!-- Subtitle -->
  <text x="80" y="566" font-family="'Segoe UI', Arial, sans-serif"
        font-size="17" fill="rgba(255,255,255,0.45)" letter-spacing="0">
    avanza-landing-xi.vercel.app
  </text>

  <!-- Right side accent: progress bar mockup -->
  <g transform="translate(860, 400)" opacity="0.7">
    <rect x="0" y="0" width="240" height="80" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="16" y="22" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">Torre Edificio Central</text>
    <rect x="16" y="32" width="208" height="6" rx="3" fill="rgba(255,255,255,0.08)"/>
    <rect x="16" y="32" width="145" height="6" rx="3" fill="url(#progfill)"/>
    <text x="16" y="56" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.35)">Avance general</text>
    <text x="188" y="56" font-family="'Segoe UI Black', Arial, sans-serif" font-size="11" font-weight="700" fill="#9B72F8">68%</text>
    <rect x="16" y="63" width="55" height="8" rx="4" fill="rgba(91,61,200,0.3)"/>
    <rect x="80" y="63" width="55" height="8" rx="4" fill="rgba(245,166,35,0.3)"/>
    <rect x="144" y="63" width="55" height="8" rx="4" fill="rgba(34,197,94,0.3)"/>
  </g>
  <defs>
    <linearGradient id="progfill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5B3DC8"/>
      <stop offset="100%" stop-color="#9B72F8"/>
    </linearGradient>
  </defs>
</svg>
